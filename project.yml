name: TransactionAI
options:
  bundleIdPrefix: com.sameer
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

targets:
  TransactionAI:
    type: application
    platform: iOS
    sources:
      - path: TransactionAI
        excludes:
          - "**/*.csv"
      - path: TransactionAI/Resources/transactions.csv
        type: file
        buildPhase: resources
    settings:
      base:
        INFOPLIST_GENERATION: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.9"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
